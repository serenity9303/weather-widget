<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial, sans-serif;
}

.weather-box {
  position: relative;
  width: 100%;
}

.date-row {
  position: absolute;

  /* 🔥 위치도 반응형으로 */
  left: clamp(24%, 28%, 30%);
  right: clamp(0.5%, 1%, 2%);
  bottom: clamp(20px, 4vw, 34px);

  display: grid;
  grid-template-columns: repeat(7, 1fr);

  font-size: clamp(8px, 1.1vw, 11px);
  font-weight: 600;
  color: #555;

  z-index: 10;
  pointer-events: none;
}

.date-item {
  text-align: left;

  /* 🔥 위치까지 같이 움직이게 */
  transform: translateX(clamp(2px, 1.8vw, 42px));

  white-space: nowrap;
}
</style>
</head>

<body>

<div class="weather-box">

  <a class="weatherwidget-io"
     href="https://forecast7.com/en/37d57126d98/seoul/"
     data-label_1="SEOUL"
     data-label_2="WEATHER"
     data-icons="Climacons Animated"
     data-theme="clear">
     SEOUL WEATHER
  </a>

  <div class="date-row" id="dateRow"></div>

</div>

<script>
const dateRow = document.getElementById("dateRow");
const today = new Date();

for (let i = 0; i < 7; i++) {
  const date = new Date(today);
  date.setDate(today.getDate() + i);

  const div = document.createElement("div");
  div.className = "date-item";
  div.innerText = (date.getMonth() + 1) + "/" + date.getDate();

  dateRow.appendChild(div);
}
</script>

<script>
!function(d,s,id){
  var js,fjs=d.getElementsByTagName(s)[0];
  if(!d.getElementById(id)){
    js=d.createElement(s);
    js.id=id;
    js.src='https://weatherwidget.io/js/widget.min.js';
    fjs.parentNode.insertBefore(js,fjs);
  }
}(document,'script','weatherwidget-io-js');
</script>

</body>
</html>
