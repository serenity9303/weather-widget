<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seoul Weather</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 14px;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
  background: transparent;
  color: white;
}

.weather-card {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: clamp(18px, 4vw, 34px);
  border-radius: 32px;
  background: linear-gradient(180deg, #5f8fd9 0%, #8fb7ee 100%);
  box-shadow: 0 12px 35px rgba(0,0,0,0.18);
}

.city {
  text-align: center;
  font-size: clamp(24px, 5vw, 42px);
  font-weight: 500;
}

.temp {
  text-align: center;
  font-size: clamp(58px, 13vw, 118px);
  font-weight: 200;
  line-height: 1;
  margin-top: 4px;
}

.desc {
  text-align: center;
  font-size: clamp(15px, 2.5vw, 22px);
  opacity: 0.9;
  margin-top: 6px;
}

.highlow {
  text-align: center;
  font-size: clamp(14px, 2.4vw, 20px);
  margin-top: 6px;
  opacity: 0.95;
}

.forecast {
  margin-top: 28px;
  padding: 14px 18px;
  border-radius: 22px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
}

.forecast-title {
  font-size: 13px;
  font-weight: 700;
  opacity: 0.8;
  margin-bottom: 8px;
}

.day-row {
  display: grid;
  grid-template-columns: 1fr 1fr 36px 1fr 1fr;
  align-items: center;
  gap: 8px;
  padding: 9px 0;
  border-top: 1px solid rgba(255,255,255,0.25);
  font-size: clamp(13px, 2.4vw, 18px);
}

.day-row:first-of-type {
  border-top: none;
}

.day {
  font-weight: 600;
}

.date {
  opacity: 0.82;
}

.icon {
  text-align: center;
  font-size: 22px;
}

.low {
  text-align: right;
  opacity: 0.75;
}

.high {
  text-align: right;
  font-weight: 600;
}

.loading {
  text-align: center;
  padding: 30px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="weather-card">
  <div class="city">Seoul</div>
  <div class="temp" id="currentTemp">--°</div>
  <div class="desc" id="weatherDesc">Loading...</div>
  <div class="highlow" id="todayHighLow">H: --°  L: --°</div>

  <div class="forecast">
    <div class="forecast-title">7-DAY FORECAST</div>
    <div id="forecastList" class="loading">날씨를 불러오는 중...</div>
  </div>
</div>

<script>
const weatherCodeMap = {
  0: ["맑음", "☀️"],
  1: ["대체로 맑음", "🌤️"],
  2: ["부분적으로 흐림", "⛅"],
  3: ["흐림", "☁️"],
  45: ["안개", "🌫️"],
  48: ["안개", "🌫️"],
  51: ["약한 이슬비", "🌦️"],
  53: ["이슬비", "🌦️"],
  55: ["강한 이슬비", "🌧️"],
  61: ["약한 비", "🌧️"],
  63: ["비", "🌧️"],
  65: ["강한 비", "🌧️"],
  71: ["약한 눈", "🌨️"],
  73: ["눈", "🌨️"],
  75: ["강한 눈", "❄️"],
  80: ["소나기", "🌦️"],
  81: ["소나기", "🌧️"],
  82: ["강한 소나기", "⛈️"],
  95: ["천둥번개", "⛈️"]
};

const daysKo = ["일", "월", "화", "수", "목", "금", "토"];

function getWeatherInfo(code) {
  return weatherCodeMap[code] || ["날씨 정보", "🌤️"];
}

async function loadWeather() {
  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=37.5665&longitude=126.9780" +
    "&current=temperature_2m,weather_code" +
    "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
    "&timezone=Asia%2FSeoul" +
    "&forecast_days=7";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const currentTemp = Math.round(data.current.temperature_2m);
    const currentCode = data.current.weather_code;
    const [desc] = getWeatherInfo(currentCode);

    document.getElementById("currentTemp").innerText = currentTemp + "°";
    document.getElementById("weatherDesc").innerText = desc;

    const todayHigh = Math.round(data.daily.temperature_2m_max[0]);
    const todayLow = Math.round(data.daily.temperature_2m_min[0]);
    document.getElementById("todayHighLow").innerText =
      "H: " + todayHigh + "°  L: " + todayLow + "°";

    const list = document.getElementById("forecastList");
    list.innerHTML = "";

    for (let i = 0; i < 7; i++) {
      const dateObj = new Date(data.daily.time[i]);
      const dayName = i === 0 ? "오늘" : daysKo[dateObj.getDay()];
      const dateText = (dateObj.getMonth() + 1) + "/" + dateObj.getDate();
      const code = data.daily.weather_code[i];
      const [, icon] = getWeatherInfo(code);

      const low = Math.round(data.daily.temperature_2m_min[i]);
      const high = Math.round(data.daily.temperature_2m_max[i]);

      const row = document.createElement("div");
      row.className = "day-row";
      row.innerHTML = `
        <div class="day">${dayName}</div>
        <div class="date">${dateText}</div>
        <div class="icon">${icon}</div>
        <div class="low">${low}°</div>
        <div class="high">${high}°</div>
      `;

      list.appendChild(row);
    }
  } catch (error) {
    document.getElementById("forecastList").innerText =
      "날씨 정보를 불러오지 못했습니다.";
  }
}

loadWeather();
</script>

</body>
</html>
