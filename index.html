<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --space-xs: clamp(0.25rem, 0.8vw, 0.5rem);
  --space-sm: clamp(0.5rem, 1.4vw, 0.9rem);
  --space-md: clamp(0.8rem, 2vw, 1.3rem);
  --space-lg: clamp(1.1rem, 3vw, 2rem);

  --radius-card: clamp(1.2rem, 4vw, 2.2rem);
  --radius-inner: clamp(0.9rem, 3vw, 1.5rem);

  --font-xs: clamp(0.62rem, 1.7vw, 0.82rem);
  --font-sm: clamp(0.78rem, 2vw, 1rem);
  --font-md: clamp(0.9rem, 2.5vw, 1.25rem);
  --font-lg: clamp(1.4rem, 5vw, 2.7rem);
  --font-temp: clamp(3.5rem, 15vw, 7.4rem);
  --font-icon: clamp(2.5rem, 10vw, 5.6rem);
}

body {
  margin: 0;
  padding: var(--space-sm);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
  background: transparent;
  color: white;
}

.weather-card {
  width: 100%;
  max-width: 48rem;
  margin: 0 auto;
  padding: var(--space-lg);
  border-radius: var(--radius-card);
  background: linear-gradient(180deg, #5f8fd9 0%, #8fb7ee 100%);
  box-shadow: 0 0.8rem 2.2rem rgba(0,0,0,0.18);
  overflow: hidden;
}

.city {
  text-align: center;
  font-size: var(--font-lg);
  font-weight: 500;
  line-height: 1.1;
}

.temp-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: var(--space-md);
  margin-top: var(--space-xs);
}

.temp {
  text-align: right;
  font-size: var(--font-temp);
  font-weight: 200;
  line-height: 1;
}

.icon-big {
  text-align: left;
  font-size: var(--font-icon);
  line-height: 1;
  transform: translateX(clamp(0.3rem, 2vw, 1.3rem));
}

.desc,
.highlow {
  text-align: center;
  font-size: var(--font-md);
  margin-top: var(--space-xs);
  opacity: 0.95;
  line-height: 1.3;
}

.forecast {
  margin-top: var(--space-lg);
  padding: var(--space-md);
  border-radius: var(--radius-inner);
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(0.75rem);
  -webkit-backdrop-filter: blur(0.75rem);
}

.forecast-title {
  font-size: var(--font-xs);
  font-weight: 700;
  opacity: 0.8;
  margin-bottom: var(--space-sm);
  letter-spacing: 0.04em;
}

.header-row,
.day-row {
  display: grid;
  grid-template-columns:
    minmax(0, 1fr)
    minmax(0, 1fr)
    minmax(0, 0.8fr)
    minmax(0, 1fr)
    minmax(0, 1fr);
  align-items: center;
  column-gap: var(--space-sm);
}

.header-row {
  font-size: var(--font-xs);
  font-weight: 700;
  opacity: 0.78;
  padding-bottom: var(--space-sm);
}

.day-row {
  padding: var(--space-sm) 0;
  border-top: 0.06rem solid rgba(255,255,255,0.25);
  font-size: var(--font-md);
}

.day {
  font-weight: 600;
  white-space: nowrap;
}

.date {
  opacity: 0.85;
  white-space: nowrap;
}

.weather {
  text-align: center;
  font-size: clamp(1.1rem, 4vw, 1.6rem);
  line-height: 1;
}

.low,
.high {
  text-align: right;
  white-space: nowrap;
}

.low {
  opacity: 0.75;
}

.high {
  font-weight: 600;
}

.header-row div:nth-child(3) {
  text-align: center;
}

.header-row div:nth-child(4),
.header-row div:nth-child(5) {
  text-align: right;
}

.loading {
  text-align: center;
  padding: var(--space-lg);
  font-size: var(--font-sm);
}

@media (max-width: 28rem) {
  .weather-card {
    padding: var(--space-md);
  }

  .forecast {
    padding: var(--space-sm);
  }

  .header-row,
  .day-row {
    grid-template-columns:
      minmax(0, 0.9fr)
      minmax(0, 1fr)
      minmax(0, 0.7fr)
      minmax(0, 0.9fr)
      minmax(0, 0.9fr);
    column-gap: var(--space-xs);
  }

  .header-row {
    font-size: clamp(0.52rem, 2.4vw, 0.68rem);
  }

  .day-row {
    font-size: clamp(0.72rem, 3.2vw, 0.9rem);
  }
}
</style>
</head>

<body>

<div class="weather-card">
  <div class="city" id="cityName">Seoul</div>

  <div class="temp-row">
    <div class="temp" id="currentTemp">--°</div>
    <div class="icon-big" id="currentIcon">☁️</div>
  </div>

  <div class="desc" id="weatherDesc">Loading...</div>
  <div class="highlow" id="todayHighLow">H: --° L: --°</div>

  <div class="forecast">
    <div class="forecast-title" id="forecastTitle">7-DAY FORECAST</div>

    <div class="header-row">
      <div id="labelDay">요일</div>
      <div id="labelDate">날짜</div>
      <div id="labelWeather">날씨</div>
      <div id="labelLow">최저온도</div>
      <div id="labelHigh">최고온도</div>
    </div>

    <div id="forecastList" class="loading">Loading...</div>
  </div>
</div>

<script>
const locale = navigator.language || "ko-KR";

const labels = {
  ko: {
    city: "서울",
    forecast: "7일 예보",
    day: "요일",
    date: "날짜",
    weather: "날씨",
    low: "최저온도",
    high: "최고온도",
    today: "오늘",
    loading: "날씨를 불러오는 중...",
    fail: "날씨 정보를 불러오지 못했습니다.",
    highShort: "최고",
    lowShort: "최저"
  },
  en: {
    city: "Seoul",
    forecast: "7-DAY FORECAST",
    day: "Day",
    date: "Date",
    weather: "Weather",
    low: "Low",
    high: "High",
    today: "Today",
    loading: "Loading weather...",
    fail: "Could not load weather.",
    highShort: "H",
    lowShort: "L"
  },
  zh: {
    city: "首尔",
    forecast: "7日天气预报",
    day: "星期",
    date: "日期",
    weather: "天气",
    low: "最低温",
    high: "最高温",
    today: "今天",
    loading: "正在加载天气...",
    fail: "无法加载天气信息。",
    highShort: "最高",
    lowShort: "最低"
  },
  ja: {
    city: "ソウル",
    forecast: "7日間の天気",
    day: "曜日",
    date: "日付",
    weather: "天気",
    low: "最低気温",
    high: "最高気温",
    today: "今日",
    loading: "天気を読み込み中...",
    fail: "天気情報を取得できませんでした。",
    highShort: "最高",
    lowShort: "最低"
  }
};

function getLang() {
  if (locale.startsWith("ko")) return "ko";
  if (locale.startsWith("zh")) return "zh";
  if (locale.startsWith("ja")) return "ja";
  return "en";
}

const lang = getLang();
const t = labels[lang];

document.documentElement.lang = locale;
document.getElementById("cityName").innerText = t.city;
document.getElementById("forecastTitle").innerText = t.forecast;
document.getElementById("labelDay").innerText = t.day;
document.getElementById("labelDate").innerText = t.date;
document.getElementById("labelWeather").innerText = t.weather;
document.getElementById("labelLow").innerText = t.low;
document.getElementById("labelHigh").innerText = t.high;
document.getElementById("forecastList").innerText = t.loading;

const weatherCodeMap = {
  0: ["Clear", "맑음", "晴", "晴れ", "☀️"],
  1: ["Mainly clear", "대체로 맑음", "大致晴朗", "ほぼ晴れ", "🌤️"],
  2: ["Partly cloudy", "부분적으로 흐림", "局部多云", "一部曇り", "⛅"],
  3: ["Cloudy", "흐림", "多云", "曇り", "☁️"],
  45: ["Fog", "안개", "雾", "霧", "🌫️"],
  48: ["Fog", "안개", "雾", "霧", "🌫️"],
  51: ["Light drizzle", "약한 이슬비", "小毛毛雨", "弱い霧雨", "🌦️"],
  53: ["Drizzle", "이슬비", "毛毛雨", "霧雨", "🌦️"],
  55: ["Heavy drizzle", "강한 이슬비", "强毛毛雨", "強い霧雨", "🌧️"],
  61: ["Light rain", "약한 비", "小雨", "小雨", "🌧️"],
  63: ["Rain", "비", "雨", "雨", "🌧️"],
  65: ["Heavy rain", "강한 비", "大雨", "大雨", "🌧️"],
  71: ["Light snow", "약한 눈", "小雪", "小雪", "🌨️"],
  73: ["Snow", "눈", "雪", "雪", "🌨️"],
  75: ["Heavy snow", "강한 눈", "大雪", "大雪", "❄️"],
  80: ["Rain showers", "소나기", "阵雨", "にわか雨", "🌦️"],
  81: ["Rain showers", "소나기", "阵雨", "にわか雨", "🌧️"],
  82: ["Heavy showers", "강한 소나기", "强阵雨", "強いにわか雨", "⛈️"],
  95: ["Thunderstorm", "천둥번개", "雷暴", "雷雨", "⛈️"]
};

function getWeatherInfo(code) {
  const info = weatherCodeMap[code] || weatherCodeMap[1];
  if (lang === "ko") return [info[1], info[4]];
  if (lang === "zh") return [info[2], info[4]];
  if (lang === "ja") return [info[3], info[4]];
  return [info[0], info[4]];
}

async function loadWeather() {
  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=37.5665&longitude=126.9780" +
    "&current=temperature_2m,weather_code" +
    "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
    "&timezone=Asia%2FSeoul" +
    "&forecast_days=7";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const currentTemp = Math.round(data.current.temperature_2m);
    const currentCode = data.current.weather_code;
    const [desc, icon] = getWeatherInfo(currentCode);

    document.getElementById("currentTemp").innerText = currentTemp + "°";
    document.getElementById("currentIcon").innerText = icon;
    document.getElementById("weatherDesc").innerText = desc;

    const todayHigh = Math.round(data.daily.temperature_2m_max[0]);
    const todayLow = Math.round(data.daily.temperature_2m_min[0]);

    document.getElementById("todayHighLow").innerText =
      `${t.highShort}: ${todayHigh}°  ${t.lowShort}: ${todayLow}°`;

    const list = document.getElementById("forecastList");
    list.className = "";
    list.innerHTML = "";

    for (let i = 0; i < 7; i++) {
      const dateObj = new Date(data.daily.time[i]);

      const dayName = i === 0
        ? t.today
        : new Intl.DateTimeFormat(locale, { weekday: "short" }).format(dateObj);

      const dateText = new Intl.DateTimeFormat(locale, {
        month: "numeric",
        day: "numeric"
      }).format(dateObj);

      const code = data.daily.weather_code[i];
      const [, icon] = getWeatherInfo(code);

      const low = Math.round(data.daily.temperature_2m_min[i]);
      const high = Math.round(data.daily.temperature_2m_max[i]);

      const row = document.createElement("div");
      row.className = "day-row";
      row.innerHTML = `
        <div class="day">${dayName}</div>
        <div class="date">${dateText}</div>
        <div class="weather">${icon}</div>
        <div class="low">${low}°</div>
        <div class="high">${high}°</div>
      `;

      list.appendChild(row);
    }
  } catch (error) {
    document.getElementById("forecastList").innerText = t.fail;
  }
}

loadWeather();
</script>

</body>
</html>
